<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Public Demo Test</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #1a1e2c;
      --border: #2a304a;
      --text: #e7eaf2;
      --muted: #8a93a6;
      --accent: #6b8eff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.6;
    }
    .wrap {
      width: 100%;
      max-width: 560px;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .intro {
      color: var(--muted);
      font-size: .95rem;
      margin-bottom: 28px;
    }
    .section-label {
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .project-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .project-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 16px 18px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      text-decoration: none;
      transition: border-color .15s, transform .15s;
    }
    .project-link:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }
    .project-name { font-weight: 600; }
    .project-arrow { color: var(--accent); font-size: 1.1rem; }
    footer {
      margin-top: 36px;
      font-size: .78rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Public Demo Test</h1>
    <p class="intro">This repository hosts public demo/test pages only.</p>

    <div class="section-label">Projects</div>
    <ul class="project-list">
      <li>
        <a class="project-link" href="./resin-product-matcher.html">
          <span class="project-name">Resin Product Matcher</span>
          <span class="project-arrow">&rarr;</span>
        </a>
      </li>
    </ul>

    <footer>Demo / test environment &middot; no production data.</footer>
  </div>
</body>
</html>
